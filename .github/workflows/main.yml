name: Build Warp4Free EXE

on:
  push:
    branches: [ main ]  # ou master, se seu branch principal for master
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # permite rodar manualmente na aba Actions

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive  # <-- ISSO É O QUE FALTAVA! Puxa submodules recursivamente

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build Warp4Free (Release x64)
      run: msbuild Warp4Free.sln /p:Configuration=Release /p:Platform=x64 /m /v:minimal

    - name: Upload Artifact (EXE)
      uses: actions/upload-artifact@v4
      with:
        name: Warp4Free-Release-x64
        path: |
          x64/Release/Warp4Free.exe
          # Se tiver mais arquivos úteis (ex: .pdb pra debug), adiciona aqui
